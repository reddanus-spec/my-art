<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Ocean</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Pure black background */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Removes scrollbars */
        }

        /* The container keeps both images perfectly aligned in the center */
        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Forces both images to stack exactly on top of each other */
        img {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Keeps aspect ratio perfect */
        }

        /* Applies the 5-second flashing animation to the top outline image */
        .outline-layer {
            animation: flashEffect 5s infinite ease-in-out;
        }

        /* The animation timeline: Starts visible, fades out at 2.5s, fades back in at 5s */
        @keyframes flashEffect {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="birthday_ocean.jpg" alt="Birthday Ocean Background">
        
        <img class="outline-layer" src="birthday_creatures.png" alt="Birthday Creatures Outlines">
    </div>

</body>
</html>
