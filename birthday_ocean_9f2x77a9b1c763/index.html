<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Ocean</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Pure black background */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto; /* Allows scrolling when zoomed in */
        }

        /* Stacks elements safely using CSS Grid */
        .image-container {
            display: grid;
            grid-template-areas: "stack";
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        img {
            grid-area: stack;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            pointer-events: none; /* Prevents accidental image-dragging on mobile */
        }

        .outline-layer {
            /* Animation is now controlled by JavaScript below */
            opacity: 1; 
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="birthday_ocean.jpg" alt="Birthday Ocean Background">
        
        <img id="outlineImage" class="outline-layer" src="birthday_creatures.png" alt="Birthday Creatures Outlines">
    </div>

    <script>
        const outline = document.getElementById('outlineImage');
        const animationDuration = 5000; // 5 seconds total loop

        function flashLoop(timestamp) {
            // Math.cos creates a perfect, smooth ease-in-out fade cycle
            const opacity = (Math.cos((timestamp / animationDuration) * 2 * Math.PI) + 1) / 2;
            
            outline.style.opacity = opacity;
            
            // Keeps the loop running continuously
            requestAnimationFrame(flashLoop);
        }

        // Start the animation
        requestAnimationFrame(flashLoop);
    </script>

</body>
</html>
