<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Ocean</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Pure black background */
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fix: Allows natural mobile scrolling/scrollbars when zoomed in */
            overflow: auto; 
        }

        /* Fix: CSS Grid stacks elements safely without breaking mobile zoom */
        .image-container {
            display: grid;
            grid-template-areas: "stack";
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        /* Both images occupy the exact same grid space, locking them together */
        img {
            grid-area: stack;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
        }

        /* Applies the 5-second flashing animation */
        .outline-layer {
            animation: flashEffect 5s infinite ease-in-out;
            transform: translateZ(0); /* Light hardware acceleration */
        }

        /* Smoothly fades the opacity from 100% to 0% and back */
        @keyframes flashEffect {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="birthday_ocean.jpg" alt="Birthday Ocean Background">
        
        <img class="outline-layer" src="birthday_creatures.png" alt="Birthday Creatures Outlines">
    </div>

</body>
</html>
